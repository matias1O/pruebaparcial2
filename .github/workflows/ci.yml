name: Pipeline CI/CD DevOps - Spring Boot

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Descargar el código del repositorio para que GitHub Actions pueda trabajar
    - name: Checkout de código
      uses: actions/checkout@v4

    # 2. Configurar Java 17 en el servidor virtual de GitHub
    - name: Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    # 3. Compilar el proyecto y ejecutar los tests de JUnit (Paso 11 de la guía)
    - name: Compilar y Ejecutar Tests con Maven
      run: mvn clean test

    # 4. Construir la imagen de Docker para asegurar que el Dockerfile no tenga fallas (Paso 11 de la guía)
    - name: Construir Imagen de Docker
      run: |
        docker build -t springboot-app-devops:${{ github.sha }} .