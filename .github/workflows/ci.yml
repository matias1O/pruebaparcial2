name: Pipeline CI/CD DevOps - Spring Boot

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Descargar el código del repositorio
    - name: Checkout de código
      uses: actions/checkout@v4

    # 2. Configurar Java 17
    - name: Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    # 3. Compilar, ejecutar tests con JaCoCo y enviar métricas a SonarCloud
    - name: Compilar, Testear y Analizar con SonarQube
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        mvn clean verify sonar:sonar \
          -Dsonar.projectKey=matias10 \
          -Dsonar.organization=matias10 \
          -Dsonar.host.url=https://sonarcloud.io

  

    # 4. Construir la imagen de Docker para asegurar que no falle
    - name: Construir Imagen de Docker
      run: |
        docker build -t springboot-app-devops:${{ github.sha }} .