name: Pipeline CI/CD DevOps - Spring Boot

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Descargar el código del repositorio
    - name: Checkout de código
      uses: actions/checkout@v4

    # 2. Configurar Java 17
    - name: Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    # 3. Compilar y ejecutar pruebas unitarias con reporte JaCoCo
    - name: Compilar y Testear con JaCoCo
      run: ./mvnw clean verify

    # 4. Construir la imagen de Docker para asegurar que no falle
    - name: Construir Imagen de Docker
      run: |
        docker build -t springboot-app-devops:${{ github.sha }} .